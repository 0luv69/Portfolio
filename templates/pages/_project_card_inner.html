<!-- Center Column (Flip Card) -->
<div class="center-section flex-1 flex justify-center items-center">
  <div class="flip-card-scene" id="profileFlipCard">
    
    <div class="flip-card-inner" id="flipInner">
      
      <!-- FRONT: Profile Image -->
      <div class="flip-card-face flip-card-front">
        <div class="image-wrapper">
          <img src="{% static 'img/me.png' %}" alt="John Deo" class="select-none profile-img">
        </div>
      </div>

      <!-- BACK: Video -->
      <div class="flip-card-face flip-card-back">
        <div class="video-wrapper">
          <iframe
            id="videoFrame"
            src=""
            data-src="https://www.youtube.com/embed/YOUR_VIDEO_ID?autoplay=1&mute=1"
            title="Profile Video"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
          </iframe>
          <div class="video-label">▶ My Story</div>
        </div>
      </div>

    </div><!-- /flip-card-inner -->

    <!-- Tap hint badge -->
    <div class="flip-hint" id="flipHint">tap to flip</div>

  </div><!-- /flip-card-scene -->
</div>




            <!-- Center Column (Image) -->
            <div class="center-section flex-1 flex justify-center items-center relative z-10">
                <!-- SVG Dashed Arrow -->
                <svg class="dashed-arrow absolute top-[37%] left-[-45%] w-[200px] h-auto pointer-events-none z-0 hidden lg:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600.000000 257.000000"> 
                    <!-- (Keep your existing svg paths here) -->
                </svg>

                <!-- Flipping Profile Image Wrapper -->
                <div id="profile-flipper" class="image-wrapper relative w-[450px] h-[450px] cursor-pointer group perspective-1000 shadow-[0_20px_40px_rgba(0,0,0,0.05)] rounded-full" onclick="this.classList.toggle('flipped')">
                    
                    <!-- Added id="flip-inner" to target the spin animation -->
                    <div id="flip-inner" class="relative w-full h-full transition-transform duration-700 [transform-style:preserve-3d]">
                        <!-- Front Face (Image 1) -->
                        <div class="absolute w-full h-full bg-white border-4 border-[#F7B733] flex justify-center items-end rounded-full overflow-hidden [backface-visibility:hidden]">
                            <img src="{% static 'img/me.png' %}" alt="John Deo" class="profile-img w-[90%] h-auto object-cover rounded-full mb-5 pointer-events-none">
                        </div>
                        
                        <!-- Back Face (Image 2) -->
                        <div class="absolute w-full h-full bg-[#1E3D3D] border-4 border-[#F7B733] flex justify-center items-end rounded-full overflow-hidden [backface-visibility:hidden] [transform:rotateY(180deg)]">
                            <img src="{% static 'img/image2.png' %}" alt="Alternative Profile" class="profile-img w-[90%] h-auto object-cover rounded-full mb-5 pointer-events-none">
                        </div>
                    </div>

                </div>
            </div>
