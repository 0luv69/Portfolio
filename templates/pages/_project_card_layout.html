<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Deo - Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Caveat for cursive, Poppins for sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F8F6F0;
            --text-dark: #1E3D3D;
            --accent-yellow: #F7B733;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* --- Left Section --- */
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6rem;
            z-index: 2;
        }

        .hero-text .greeting {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .hero-text .name {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
            line-height: 1.1;
        }

        .experience-social {
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .experience {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .experience .years {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1;
        }

        .experience .exp-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
        }

        .social-icons a {
            color: var(--accent-yellow);
            font-size: 1.2rem;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .social-icons a:hover {
            opacity: 0.8;
        }

        /* --- Center Section --- */
        .center-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background-color: var(--white);
            border: 4px solid var(--accent-yellow);
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Align image to bottom */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .profile-img {
            width: 90%;
            height: auto;
            object-fit: cover;
            /* Replace with your transparent PNG of the person */
        }

        /* Decorative Dashed Arrow */
        .dashed-arrow {
            position: absolute;
            top: 20%;
            left: -25%;
            width: 200px;
            height: auto;
            pointer-events: none;
            z-index: 0;
        }

        /* --- Right Section --- */
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4rem;
            text-align: right;
            position: relative;
            z-index: 2;
        }

        .description {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-dark);
            max-width: 300px;
            margin-top: -8rem;
        }

        /* Reviews Card */
        .reviews-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            position: absolute;
            right: 40px;
            top: 40%;
            width: 240px;
            z-index: 10;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stars {
            color: var(--accent-yellow);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .card-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
        }

        .avatars {
            display: flex;
        }

        .avatars img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--white);
            margin-left: -10px;
            object-fit: cover;
        }
        .avatars img:first-child {
            margin-left: 0;
        }

        .rating {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .role-wrapper {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .role-creative {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: var(--text-dark);
            line-height: 0.8;
            margin-right: 40px;
        }

        .role-designer {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
                gap: 4rem;
                text-align: center;
            }
            .left-section, .right-section {
                align-items: center;
                text-align: center;
            }
            .description {
                margin-top: 0;
            }
            .reviews-card {
                position: relative;
                top: auto;
                right: auto;
            }
            .dashed-arrow {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Left Column -->
        <div class="left-section">
            <div class="hero-text">
                <h1 class="greeting">Hy! I Am</h1>
                <h2 class="name">John Deo.</h2>
            </div>

            <div class="experience-social">
                <div class="experience">
                    <span class="years">08</span>
                    <span class="exp-text">YEARS<br>EXPERIENCE</span>
                </div>
                
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>

        <!-- Center Column (Image) -->
        <div class="center-section">
            <!-- SVG for the dashed arrow pointing left -->
            <svg class="dashed-arrow" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M190 20 C 140 -10, 80 50, 10 70" stroke="#1E3D3D" stroke-width="2" stroke-dasharray="6 6" fill="transparent"/>
                <path d="M15 63 L 5 72 L 17 78" stroke="#1E3D3D" stroke-width="2" fill="transparent" />
            </svg>

            <div class="image-wrapper">
                <!-- Replace with actual transparent portrait image -->
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500&auto=format&fit=crop&q=60" alt="John Deo" class="profile-img" style="border-radius: 50%; margin-bottom: 20px;">
            </div>
        </div>

        <!-- Right Column -->
        <div class="right-section">
            <p class="description">I design beautifully simple things,<br>and I love what i do.</p>
            
            <div class="reviews-card">
                <div class="card-header">
                    <span>12k Reviews On</span>
                    <span class="stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                    </span>
                </div>
                <div class="card-body">
                    <div class="avatars">
                        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Reviewer">
                        <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Reviewer">
                        <img src="https://randomuser.me/api/portraits/men/46.jpg" alt="Reviewer">
                        <img src="https://randomuser.me/api/portraits/women/65.jpg" alt="Reviewer">
                        <img src="https://randomuser.me/api/portraits/men/85.jpg" alt="Reviewer">
                    </div>
                    <span class="rating">4.9</span>
                </div>
            </div>

            <div class="role-wrapper">
                <span class="role-creative">Creative</span>
                <span class="role-designer">Designer.</span>
            </div>
        </div>

    </div>

</body>
</html>
