<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-caveat { font-family: 'Caveat', cursive; }
        
        /* 3D Flip Utility Classes */
        .perspective-1000 { perspective: 1000px; }
        #profile-flipper.flipped #flip-inner { transform: rotateY(180deg); }

        @keyframes coinSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(1080deg); }
        }
        .spin-on-load {
            animation: coinSpin 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes typing {
          from { width: 0 }
          to { 
            width: 100%;
            border-right: 0px solid transparent;
           }
        }
        .typewriter {
          overflow: hidden;
          white-space: nowrap;
          border-right: 2px solid #F7B733;
          width: 0;
        }
        .typewriter.animate-on {
          animation: typing 1s steps(20,end) forwards;
        }

        @keyframes arrow-draw {
            from { opacity: 1; clip-path: inset(0 100% 0 0); }
            to   { opacity: 1; clip-path: inset(0 0%   0 0); }
        }
        .dashed-arrow.animate-on {
            animation: arrow-draw 1.2s ease-in-out .4s forwards;
        }

        .idea-word, .build-word, .ship-word,
        .arrow-1, .arrow-2, .ship-spark {
            opacity: 0;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes arrow-in {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes spark-pop {
            0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.3) rotate(-30deg); }
            50%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.2) rotate(10deg);  }
            75%  { opacity: 1;   transform: translate(-50%, -50%) scale(0.9) rotate(-5deg);  }
            100% { opacity: 1;   transform: translate(-50%, -50%) scale(1)   rotate(0deg);   }
        }

        .idea-word.animate-on  { animation: fade-up  0.4s ease-out 0.3s  forwards; }
        .arrow-1.animate-on     { animation: arrow-in 0.4s ease-out 0.6s  forwards; }
        .build-word.animate-on { animation: fade-up  0.4s ease-out 0.9s  forwards; }
        .arrow-2.animate-on    { animation: arrow-in 0.4s ease-out 1.2s  forwards; }
        .ship-word.animate-on  { animation: fade-up  0.4s ease-out 1.5s  forwards; }
        .ship-spark.animate-on { animation: spark-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.8s forwards; }

        @keyframes highlight-sweep {
            from { width: 0%; }
            to   { width: 100%; }
        }
        .highlight-bg.animate-on {
            animation: highlight-sweep 0.6s ease-out forwards;
        }
        .highlight-bg-1 {width: 0; animation-delay: 0.4s; }
        .highlight-bg-2 {width: 0; animation-delay: 0.9s; }

        /* Ensure smooth touch interactions */
        #profile-flipper {
            -webkit-tap-highlight-color: transparent;
        }

        /* Prevent scrolling on mobile for single viewport experience */
        @media (max-width: 1024px) {
            body {
                overflow: hidden;
                height: 100svh;
            }
            main {
                height: 100%;
            }
        }
    </style>
</head>

                    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const flipper = document.getElementById('profile-flipper');
        
        if (flipper) {
            // Smooth flip logic for both click and touch
            flipper.addEventListener('click', () => {
                flipper.classList.toggle('flipped');
            });
        }

        // Intersection Observer to re-trigger animations if needed or ensure they fire on scroll
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.querySelectorAll('.animate-on').forEach(el => {
                        el.style.animationPlayState = 'running';
                    });
                }
            });
        }, observerOptions);

        const hero = document.getElementById('home');
        if (hero) observer.observe(hero);
    });
</script>
